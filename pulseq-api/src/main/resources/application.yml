spring:
  application:
    name: pulseq-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pulseq}
    username: ${POSTGRES_USER:pulseq}
    password: ${POSTGRES_PASSWORD:pulseq1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${APP_PORT:8080}

pulseq:
  jwt:
    secret: ${JWT_SECRET:pulseq-dev-secret-key-must-be-at-least-32-chars-long}
    expiry-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: pulseq-api

logging:
  level:
    com.pulseq: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
