spring:
  datasource:
    url: jdbc:h2:mem:pulseq-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

pulseq:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long-for-testing
    expiry-ms: 3600000

logging:
  level:
    com.pulseq: DEBUG
