services:
  # ===== Core Services =====
  postgres:
    image: postgres:16-alpine
    container_name: pulseq-postgres
    environment:
      POSTGRES_DB: pulseq
      POSTGRES_USER: pulseq
      POSTGRES_PASSWORD: pulseq1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseq"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulseq-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===== Pipeline Services (Phase 3+) =====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: pulseq-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    profiles:
      - pipeline
      - full

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: pulseq-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    profiles:
      - pipeline
      - full

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pulseq-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8989:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pulseq
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    profiles:
      - full

  # ===== Monitoring (Phase 5+) =====
  prometheus:
    image: prom/prometheus:latest
    container_name: pulseq-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    profiles:
      - monitoring
      - full

  grafana:
    image: grafana/grafana:latest
    container_name: pulseq-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    profiles:
      - monitoring
      - full

volumes:
  pgdata:
  redisdata:
